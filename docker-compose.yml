services:
  pdf-extractor:
    build: .
    container_name: pdf-extractor
    restart: unless-stopped

    expose:
      - "8000"

    networks:
      - stackora-network

    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs

    # Memoria compartida más grande → evita crashes en procesamiento paralelo de imágenes
    shm_size: "256mb"

    environment:
      - OMP_THREAD_LIMIT=1
      - OMP_NUM_THREADS=1

    deploy:
      resources:
        limits:
          # Ajusta según tu VPS. OCR pesado puede necesitar 1-2 GB.
          # Con 2 GB de RAM en el VPS, reserva 1.2 GB para el contenedor.
          memory: 1200M
        reservations:
          memory: 512M

networks:
  stackora-network:
    external: true